<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi Checkpoint Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            /* Cyan to Red Gradient */
            --theme-start: #00ffff;
            --theme-end: #ff0055;
            --bg-color: rgba(10, 15, 25, 0.6);
            --text-glow-start: rgba(0, 255, 255, 0.8);
            --text-glow-end: rgba(255, 0, 85, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            /* For OBS */
            color: white;
            font-family: 'Rajdhani', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .overlay-container {
            width: 600px;
            position: relative;
            padding: 20px;
            /* Remove background from container, let the track shine */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
            padding: 0 10px;
            position: relative;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--text-glow-start);
            opacity: 0.9;
            /* Removed the strikethrough line */
        }

        .status {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px var(--text-glow-end);
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .status-max {
            font-size: 16px;
            color: #ffffff;
            opacity: 0.8;
            font-weight: 600;
            text-shadow: none;
        }

        /* The main track (background of the bar) */
        .progress-track {
            position: relative;
            height: 14px;
            background: rgba(0, 0, 0, 0.5);
            /* Deeper angle for sci-fi look */
            clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border-bottom: 2px solid rgba(255, 0, 85, 0.3);
        }

        /* The actual fill bar */
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--theme-start), var(--theme-end));
            box-shadow: 0 0 20px var(--theme-end);
            transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            /* Keep fill within the track's angles */
        }

        /* Light sweep effect across the ENTIRE bar */
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.9),
                    transparent);
            animation: sweep 2.5s infinite linear;
            transform: skewX(-20deg);
        }

        @keyframes sweep {
            0% {
                left: -100%;
            }

            50% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        /* Top tech line decoration */
        .track-decoration {
            position: absolute;
            top: -4px;
            right: 0;
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--theme-end));
            opacity: 0.6;
        }

        @keyframes pulse-glow {
            0% {
                filter: drop-shadow(0 0 5px var(--theme-start));
            }

            50% {
                filter: drop-shadow(0 0 15px var(--theme-start));
            }

            100% {
                filter: drop-shadow(0 0 5px var(--theme-start));
            }
        }

        .level-up .status {
            animation: cp-bump 0.5s ease-out;
        }

        @keyframes cp-bump {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
                text-shadow: 0 0 30px #fff, 0 0 50px var(--glow-color);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Test Controls (Remove or hide for production) */
        .controls {
            position: fixed;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            opacity: 0;
            /* Hidden by default in OBS */
        }

        .controls:hover {
            opacity: 1;
        }

        .controls button {
            background: #333;
            color: #fff;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="overlay-container" id="overlay">
        <div class="track-decoration-top"></div>
        <div class="header">
            <div class="title">Checkpoint</div>
            <div class="status">
                <span id="current-cp">0</span>
                <span class="status-max">/ <span id="max-cp">60</span></span>
            </div>
        </div>
        <div class="progress-track" style="animation: pulse-glow 3s infinite;">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        <div class="track-decoration"></div>
    </div>

    <!-- Controls for testing in browser -->
    <div class="controls">
        <button onclick="testUpdate(-1)">-1</button>
        <button onclick="testUpdate(1)">+1</button>
        <button onclick="testUpdate(5)">+5</button>
        <button onclick="setCheckpoint(60, 60)">Max</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const progressBar = document.getElementById('progress-bar');
        const currentCpText = document.getElementById('current-cp');
        const maxCpText = document.getElementById('max-cp');
        const overlay = document.getElementById('overlay');
        const particlesContainer = document.getElementById('particles');

        let currentCp = 0;
        let maxCp = 60;

        /**
         * Update the checkpoint UI
         */
        function setCheckpoint(newCurrent, newMax = maxCp) {
            if (newCurrent > currentCp) {
                // Remove animation class and trigger reflow
                overlay.classList.remove('level-up');
                void overlay.offsetWidth;
                overlay.classList.add('level-up');
            }

            currentCp = Math.max(0, Math.min(newCurrent, newMax));
            maxCp = newMax;

            currentCpText.innerText = currentCp;
            maxCpText.innerText = maxCp;

            const percentage = (currentCp / maxCp) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // Initialize display
        setCheckpoint(0, 60);

        // Connect to Socket.IO local server
        const socket = io();

        socket.on('cp_update', (data) => {
            console.log('Update received:', data);
            setCheckpoint(data.current, data.max);
        });

        // Test function (Hidden in OBS, only visible in browser hover)
        function testUpdate(amount) {
            setCheckpoint(currentCp + amount, maxCp);
        }
    </script>
</body>

</html>
