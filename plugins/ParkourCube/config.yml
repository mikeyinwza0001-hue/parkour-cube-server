# ParkourCube Configuration

# Mabel Tracker security
tracker:
  url: "http://localhost:3000"
  plugin-name: "ParkourCube"
  # Heartbeat interval in minutes
  heartbeat-minutes: 5

# Checkpoint data API (overlay server)
checkpoint-api:
  url: "http://localhost:6969/api/checkpoints"
  key: "CHANGE_ME_TO_A_SECRET_KEY"

# OBS Overlay log file path
overlay:
  log-file: "plugins/Skript/logs/cp_overlay_data.log"

# Total checkpoints for display
total-checkpoints: 60
