name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for overlay dependencies)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version from server-version.json
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content .\server-version.json | ConvertFrom-Json)
          echo "VERSION=$($v.version)" >> $env:GITHUB_OUTPUT
          echo "MC_VERSION=$($v.mc_version)" >> $env:GITHUB_OUTPUT
          echo "CHANGELOG=$($v.changelog)" >> $env:GITHUB_OUTPUT

      - name: Download latest Paper server jar
        shell: pwsh
        run: |
          $mc = "${{ steps.version.outputs.MC_VERSION }}"
          Write-Host "Fetching latest Paper build for $mc..."
          $builds = Invoke-RestMethod "https://api.papermc.io/v2/projects/paper/versions/$mc/builds"
          $latest = $builds.builds | Select-Object -Last 1
          $buildNum = $latest.build
          $jarName  = $latest.downloads.application.name
          $url = "https://api.papermc.io/v2/projects/paper/versions/$mc/builds/$buildNum/downloads/$jarName"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile ".\paper.jar"
          $sz = [math]::Round((Get-Item .\paper.jar).Length / 1MB, 1)
          Write-Host "paper.jar downloaded ($sz MB)"

      - name: Download bundled JRE (Temurin 21, Windows x64)
        shell: pwsh
        run: |
          $apiUrl = "https://api.adoptium.net/v3/assets/latest/21/hotspot?architecture=x64&image_type=jre&os=windows&vendor=eclipse"
          $assets = Invoke-RestMethod $apiUrl
          $pkg = $assets[0].binary.package
          Write-Host "Downloading JRE: $($pkg.name)"
          Invoke-WebRequest -Uri $pkg.link -OutFile ".\jre.zip"
          Expand-Archive -Path ".\jre.zip" -DestinationPath ".\jre-extract" -Force
          $root = Get-ChildItem ".\jre-extract" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path ".\jre" | Out-Null
          Copy-Item -Path "$($root.FullName)\*" -Destination ".\jre" -Recurse -Force
          Remove-Item ".\jre.zip" -Force
          Remove-Item ".\jre-extract" -Recurse -Force
          Write-Host "JRE ready at .\jre\bin\java.exe"

      - name: Build release zip
        shell: pwsh
        run: |
          .\build-release.ps1

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }} - Minecraft ${{ steps.version.outputs.MC_VERSION }}"
          body: |
            ## Parkour Cube Server v${{ steps.version.outputs.VERSION }}
            
            **Minecraft Version:** ${{ steps.version.outputs.MC_VERSION }}
            
            ${{ steps.version.outputs.CHANGELOG }}
            
            ---
            > Auto-generated release from GitHub Actions
          files: release/mabel-parkour-cube-server-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
